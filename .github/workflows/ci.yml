name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  safety:
    name: Public safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run public safety check
        run: ./scripts/check-public-safety.sh

  agent-path-gate:
    name: Agent path gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Enforce implementer boundary
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: ./scripts/check-agent-paths.sh "origin/${BASE_REF}" "${HEAD_REF}"

  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Release dry run (immutable archive)
        run: |
          pnpm release:game --cycle 0 --build 0 --summary "CI dry run" --out /tmp/loome-archive
          if pnpm release:game --cycle 0 --build 0 --summary "CI dry run" --out /tmp/loome-archive; then
            echo "immutability violated: duplicate release succeeded" >&2
            exit 1
          fi
          test -f /tmp/loome-archive/v/0.0.0/index.html
          test -f /tmp/loome-archive/current/index.html
          test -f /tmp/loome-archive/versions.json
          test -f /tmp/loome-archive/index.html
